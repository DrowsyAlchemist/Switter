services:

  apigateway:
    build:
      context: ./src/ApiGateway
      dockerfile: Dockerfile
    container_name: api-gateway
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:80
      - Jwt:Secret=${JWT_SECRET}
      - Jwt:Issuer=${JWT_ISSUER}
      - Jwt:Audience=${JWT_AUDIENCE}
    ports:
      - "5000:80"  
    depends_on:
      - authservice
      - userservice
      - tweetservice
      #- chatservice
    networks:
      - switter-network
    restart: unless-stopped

  authservice:
    build:
      context: ./src/AuthService
      dockerfile: Dockerfile
    container_name: auth-service
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:80
      - ConnectionStrings:PostgreSQL=Host=${POSTGRES_HOST};Port=${POSTGRES_PORT};Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
      - Redis:ConnectionString=${REDIS_HOST}:${REDIS_PORT},password=${REDIS_PASSWORD},abortConnect=false
      - Kafka:BootstrapServers=${KAFKA_HOST}:${KAFKA_PORT}
      - Jwt:Secret=${JWT_SECRET}
      - Jwt:Issuer=switter-dev
      - Jwt:Audience=switter-dev
    ports:
      - "5001:80"
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks: 
      - switter-network
    restart: unless-stopped

  userservice:
    build:
      context: ./src/UserService
      dockerfile: Dockerfile
    container_name: user-service
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:80
      - ConnectionStrings:PostgreSQL=Host=${POSTGRES_HOST};Port=${POSTGRES_PORT};Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
      - Redis:ConnectionString=${REDIS_HOST}:${REDIS_PORT},password=${REDIS_PASSWORD},abortConnect=false
      - Kafka:BootstrapServers=${KAFKA_HOST}:${KAFKA_PORT}
    ports:
      - "5002:80"
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      kafka-setup:  
        condition: service_completed_successfully
    networks: 
      - switter-network
    restart: unless-stopped

  tweetservice:
    build:
      context: ./src/TweetService
      dockerfile: Dockerfile
    container_name: tweet-service
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:80
